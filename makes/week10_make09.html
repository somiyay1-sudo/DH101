# Make 9. Games and Play

## Deliverables

### Concept E: Your Own Idea

#### Design Statement (300 words)

The core concept of this game revolves around "the ethics of using AI weaponry and the question of where responsibility lies." In recent years, AI-equipped weapons, known as Lethal Autonomous Weapons Systems (LAWS), have been under development. While these systems are capable of operating in hazardous environments, concerns have been raised regarding the implications of conducting combat operations based on AI decision-making alone. This game is designed to prompt players to contemplate the deployment of AI weaponry, the ethical judgments involved in its use, and the ultimate locus of responsibility. Within the game, players assume the role of a commander, faced with the choice of whether to deploy human combatants or utilize AI-driven weapons. However, should an AI system cause civilian casualties, who bears the responsibility? This game challenges players to confront the question of who is accountable for the actions of an AI, as well as the broader ethical dilemmas inherent in employing AI in combat. The notion of a non-human entity, an AI, making the decision to take a human life remains a subject of significant ethical debate. Furthermore, if an AI system does result in civilian casualties, players are given the choice: accept personal responsibility for the outcome, or shift that responsibility onto the AI itself. In the context of warfare, the use of AI signifies a departure from human limitations, a scenario in which a machine takes a human life. Players may, out of fear that the AI could go rogue, choose to forgo its use and instead send human soldiers into the fray. Yet, when those soldiers are subsequently wounded or killed in action, will the player continue to hesitate in deploying the AI? Or will they choose to overcome their ethical qualms, weighing the risks associated with AI, and deploy it to the front lines? This game captures that delicate balance between ethical considerations and the intense pressure of the battlefield.

### "How I Use AI" Page (on your website)

**What AI tools you used**
ChatGPT

**Specific prompts/tasks**
- How to use Twine and Inky
- Brainstorming ideas
- Bringing realism to combat depictions

**AI Prompt**
- What are the ongoing debates regarding accountability and ethics surrounding LAWS?
- Tell me about real-world scenarios where AI is used in warfare.
- How does one go about coding in Twine?
- How do you create branching paths?
- Write a description that portrays a combat scene of AI drone with greater realism.

**What you kept vs. changed**
In addition to the code generated by the AI, I added new connections and expanded the endings.

**Your policy on AI use**
I did not involve AI in the creation of the story itself; instead, I wrote the story myself and then asked the AI how to write the code. My approach was to utilize the AI strictly as a tool for implementation, ensuring that it played no part in the elements pertaining to originality.

### Artist Statement (250 words)

Games allow for player agency, or the ability to make choices. In other words, players can personally determine the nature of their engagement with AI within the context of a game, including whether or not to utilize it. This format calls upon players to actively engage in the process of "making judgments" rather than passively learning by reading an essay. These mechanics encourage players to deeply reflect on their relationship with AI. Furthermore, by creating a "reproduction of a non-real space," games enable players to experience high-stakes, tense decision-making scenarios that they would rarely, if ever, encounter in real life. This game illustrates the dilemma of entrusting an AI with the decision to take a human life, a scenario that can only be effectively simulated within the gaming medium. While this game functions as a war simulation, one of its distinct advantages is the ability to use simulations to alert the public to the potential dangers of AI.

I utilized AI to infuse the game's depictions with a sense of realism. As I am not a member of the military, I lack specialized knowledge regarding the portrayal of warfare. In this regard, the vast datasets at AI's disposal make it exceptionally adept at depicting war with accuracy. Drawing upon historical records and similar sources, an AI likely possesses a far better understanding than we do of precisely what scenarios to depict, and how to articulate them to the player, in order to convey the reality of war. For this very reason, I enlisted the AI to refine my own narrative passages, thereby ensuring that players would gain a more vivid and authentic sense of what actual combat entails.
