## What counts as "making" in the age of AI?

In the age of AI, **"making" means connecting data and people.** Relying on machines allows people to access large-scale data and digital archives. This exposure to new information and environments can stimulate creativity.

### The Risk of Over-Reliance

However, relying too much on AI could lead to a lack of human interaction. People might find themselves only communicating with AI rather than with each other, which would result in a lack of human connection.

### The Blurred Line

The bigger concern is this: **We may no longer be able to define something as "made by humans."** If people stop communicating with each other and entrust everything to AI, the distinction between "human-made" and "AI-made" will become blurred, and the concept of "making" will ultimately belong to AI.      </textarea>
